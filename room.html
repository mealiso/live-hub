<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Hub - Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #4f46e5; --danger: #ef4444; --warning: #f59e0b; --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.9); --panel-border: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc; --text-muted: #cbd5e1; --sidebar-width: 340px;
        }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); color: var(--text-main); height: 100dvh; overflow: hidden; display: flex; }
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 500; }
        
        #langSwitcher { 
            position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); padding: 6px 12px; border-radius: 30px; cursor: pointer; 
            border: 1px solid var(--panel-border); font-weight: 600; font-size: 13px;
            display: flex; align-items: center; gap: 6px; transition: 0.3s; z-index: 1000;
        }
        #langSwitcher:hover { background: rgba(255, 255, 255, 0.2); }

        #mainContent { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; overflow: hidden;}
        
        /* Grid */
        #videoGrid { flex: 1; overflow-y: auto; padding-bottom: 90px; display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr)); grid-auto-rows: max-content; gap: 12px; justify-items: center; }
        #videoGrid::-webkit-scrollbar { width: 0px; }
        .video-container { position: relative; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 8px 25px rgba(0,0,0,0.5); aspect-ratio: 16/9; width: 100%; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-container video.mirror { transform: scaleX(-1); }
        .name-badge { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 6px; font-size: 12px; backdrop-filter: blur(8px); }

        /* Sidebar */
        #sidebar { width: var(--sidebar-width); background: var(--panel-bg); border-left: 1px solid var(--panel-border); display: none; flex-direction: column; z-index: 1000; flex-shrink: 0;}
        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--panel-border); flex-shrink: 0; background: rgba(0,0,0,0.2);}
        .tab-btn { flex: 1; padding: 12px 5px; background: transparent; border: none; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(255,255,255,0.05); }
        .tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }
        
        /* Chat */
        #chatMessages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; font-size: 13px; word-break: break-word;}
        .msg-box.me { background: rgba(79, 70, 229, 0.3); align-self: flex-end; }
        .msg-author { font-size: 11px; color: #818cf8; font-weight: 600; margin-bottom: 4px; }
        #chatInputArea { display: flex; padding: 10px; background: rgba(0,0,0,0.3); gap: 8px;}
        #chatInputArea input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--panel-border); background: #000; color: white; outline: none;}
        #sendChatBtn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer;}
        #chatDisabledMsg { display: none; padding: 15px; text-align: center; color: var(--danger); font-size: 13px; font-weight: bold; background: rgba(0,0,0,0.5);}

        /* Participants */
        #participantsList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .participant-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; font-size: 13px; }
        .user-actions { display: flex; gap: 5px; }
        .action-btn { background: rgba(255,255,255,0.1); color: white; border: none; border-radius: 6px; padding: 5px; cursor: pointer; display: flex; align-items: center;}
        .action-btn.restricted { color: var(--danger); background: rgba(239, 68, 68, 0.15); }
        .action-btn:hover { background: rgba(255,255,255,0.2); }

        /* Settings (Only Host) */
        #tabSettings { padding: 15px; overflow-y: auto; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; border: 1px solid rgba(255,255,255,0.05);}
        .host-action-btn { width: 100%; padding: 10px; background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s;}
        .host-action-btn:hover { background: var(--danger); color: white; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Alt Kontroller */
        #controlsBar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); padding: 8px 15px; border-radius: 100px; border: 1px solid var(--panel-border); display: flex; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 500;}
        .control-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; background: rgba(255,255,255,0.1); transition: 0.2s;}
        .control-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
        .control-btn.off { background: var(--warning); color: #000; }
        .control-btn.danger { background: var(--danger); }
        .control-btn.active-tab { background: var(--primary); }
        .control-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @media (max-width: 768px) {
            #sidebar { position: absolute; right: 0; top: 0; width: 100%; transform: translateX(100%); transition: transform 0.3s; }
            #sidebar.open { transform: translateX(0); }
            #controlsBar { width: max-content; max-width: 95%; flex-wrap: wrap; justify-content: center;}
            #langSwitcher { top: 10px; right: 10px; padding: 4px 10px; font-size: 12px; }
        }
        #closeSidebarMobile { display: none; background: transparent; color: white; border: none; padding: 15px; cursor: pointer; align-items: center; border-bottom: 1px solid var(--panel-border); font-weight: 600;}
        @media (max-width: 768px) { #closeSidebarMobile { display: flex; } }
    </style>
</head>
<body>

    <div id="langSwitcher" onclick="toggleLanguage()">
        <span class="material-symbols-rounded" style="font-size: 16px;">language</span> 
        <span id="langText">EN / TR</span>
    </div>

    <div id="mainContent">
        <div id="invitePanel" style="background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; margin-bottom: 10px; border: 1px dashed #64748b; margin-top: 30px;">
            <div id="inviteLink" style="color: #818cf8; font-size: 13px; font-weight: bold; cursor: pointer;">Generating Link...</div>
        </div>

        <div id="videoGrid"></div>

        <div id="controlsBar">
            <button id="toggleAudioBtn" class="control-btn"><span class="material-symbols-rounded">mic</span></button>
            <button id="toggleVideoBtn" class="control-btn"><span class="material-symbols-rounded">videocam</span></button>
            <button id="toggleParticipantsBtn" class="control-btn"><span class="material-symbols-rounded">group</span></button>
            <button id="toggleChatBtn" class="control-btn"><span class="material-symbols-rounded">chat</span></button>
            <button id="toggleSettingsBtn" class="control-btn" style="display: none;"><span class="material-symbols-rounded">settings</span></button>
            <button id="leaveMeetingBtn" class="control-btn danger"><span class="material-symbols-rounded">call_end</span></button>
        </div>
    </div>

    <div id="sidebar">
        <button id="closeSidebarMobile"><span class="material-symbols-rounded">close</span> <span id="txtClose">Close Panel</span></button>
        
        <div class="sidebar-tabs">
            <button id="tabBtnParticipants" class="tab-btn active">People</button>
            <button id="tabBtnChat" class="tab-btn">Chat</button>
            <button id="tabBtnSettings" class="tab-btn" style="display:none;">Settings</button>
        </div>

        <div id="tabParticipants" class="tab-content active">
            <div id="participantsList"></div>
            <div id="hostQuickActions" style="padding: 10px; border-top: 1px solid var(--panel-border); display: none;">
                <button id="muteAllBtn" class="host-action-btn" style="margin-top:0;">Mute All Mics</button>
                <button id="camsOffAllBtn" class="host-action-btn">Turn Off All Cams</button>
            </div>
        </div>

        <div id="tabChat" class="tab-content">
            <div id="chatMessages"></div>
            <div id="chatDisabledMsg">Chat is currently disabled by Host.</div>
            <div id="chatInputArea">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button id="sendChatBtn"><span class="material-symbols-rounded">send</span></button>
            </div>
        </div>

        <div id="tabSettings" class="tab-content">
            <div id="lblRoomRules" style="color: var(--warning); font-size: 12px; margin-bottom: 15px; font-weight: bold;">Global Room Rules</div>
            
            <div class="setting-row">
                <span id="lblAllowCam">Allow Cameras</span>
                <label class="switch"><input type="checkbox" id="setAllowCam" checked><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <span id="lblAllowChat">Enable Chat</span>
                <label class="switch"><input type="checkbox" id="setAllowChat" checked><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <span id="lblStrictMute">Strict Mute (No Chat)</span>
                <label class="switch"><input type="checkbox" id="setStrictMute"><span class="slider"></span></label>
            </div>
            <div class="setting-row" style="border-color: var(--primary);">
                <span id="lblChatOnly" style="color: #818cf8; font-weight: bold;">Chat Only Mode</span>
                <label class="switch"><input type="checkbox" id="setChatOnly"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <script src="room.js?v=3"></script>
</body>
</html>
