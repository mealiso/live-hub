<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Hub - Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --bg-dark: #0f172a; --panel-bg: rgba(30, 41, 59, 0.85);
            --panel-border: rgba(255, 255, 255, 0.15); --text-main: #f8fafc; --text-muted: #cbd5e1;
        }
        body { 
            font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); 
            color: var(--text-main); height: 100dvh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; overflow: hidden;
        }
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 500; display: flex; align-items: center; justify-content: center; }
        
        #langSwitcher { 
            position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(12px); padding: 8px 16px; border-radius: 30px; cursor: pointer; 
            border: 1px solid var(--panel-border); font-weight: 600; font-size: 14px;
            display: flex; align-items: center; gap: 6px; transition: 0.3s; z-index: 100;
        }
        #langSwitcher:hover { background: rgba(255, 255, 255, 0.2); }

        .glass-panel {
            background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--panel-border);
            border-radius: 20px; padding: clamp(20px, 5vw, 35px); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%; max-width: 450px; text-align: center;
        }
        h1 { font-weight: 800; font-size: 2.2rem; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; font-weight: 600;}
        input[type="text"] { 
            width: 100%; padding: 14px 16px; font-size: 16px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); 
            color: white; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn { 
            padding: 14px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 10px; 
            font-weight: 600; transition: all 0.3s ease; width: 100%; margin-bottom: 12px; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>
    <div id="langSwitcher" onclick="toggleLanguage()">
        <span class="material-symbols-rounded" style="font-size: 18px;">language</span> 
        <span id="langText">EN / TR</span>
    </div>

    <div class="glass-panel">
        <h1 id="titleText">Live Hub</h1>
        
        <div class="input-group">
            <label id="lobbyNameDesc" for="usernameInput">Your Name:</label>
            <input type="text" id="usernameInput" placeholder="Enter your name...">
        </div>

        <div style="margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>

        <button id="createMeetingBtn" class="btn btn-primary">
            <span class="material-symbols-rounded">video_call</span> <span id="btnCreateText">Start New Meeting</span>
        </button>
        
        <div style="margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative;">
            <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); padding: 0 10px; font-size: 12px; color: var(--text-muted); border-radius: 5px;">OR</span>
        </div>

        <div class="input-group" style="margin-bottom: 10px;">
            <input type="text" id="roomInput" placeholder="Meeting ID or Link...">
        </div>
        <button id="joinMeetingBtn" class="btn btn-secondary">
            <span class="material-symbols-rounded">login</span> <span id="btnJoinText">Join Meeting</span>
        </button>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
