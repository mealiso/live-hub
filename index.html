<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Hub - Video Conference</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; 
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.8);
            --panel-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a, #1e1b4b); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        
        h1 { font-weight: 800; font-size: 2.5rem; margin-bottom: 20px; text-align: center; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }

        #langSwitcher { 
            position: fixed; top: 20px; right: 20px; z-index: 100; 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 8px 16px; border-radius: 30px; cursor: pointer; 
            border: 1px solid var(--panel-border); font-weight: 600; 
            display: flex; align-items: center; gap: 8px; transition: 0.3s; 
        }
        #langSwitcher:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        /* Lobi Ekranı (Toplantı Kur / Katıl) */
        #lobbyScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; flex: 1; }
        .input-group { margin-bottom: 20px; width: 100%; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: #cbd5e1; font-size: 14px; font-weight: 600;}
        input[type="text"] { 
            width: 100%; padding: 12px 16px; font-size: 16px; 
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.4); color: white; outline: none; box-sizing: border-box;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn { 
            padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; 
            border-radius: 8px; font-weight: 600; transition: all 0.3s ease; 
            width: 100%; margin-bottom: 10px;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        /* Toplantı Odası Ekranı (Zoom Grid) */
        #meetingScreen { display: none; width: 100%; max-width: 1200px; flex-direction: column; align-items: center; }
        
        #videoGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            width: 100%;
            margin-bottom: 80px; /* Alttaki kontroller için boşluk */
        }

        .video-container { position: relative; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.4); aspect-ratio: 16/9;}
        .video-container video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-container video.mirror { transform: scaleX(-1); }
        .name-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; backdrop-filter: blur(4px);}

        /* Alt Kontrol Çubuğu */
        #controlsBar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--panel-bg); backdrop-filter: blur(16px);
            padding: 15px 25px; border-radius: 100px; border: 1px solid var(--panel-border);
            display: flex; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 50;
        }
        .control-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; color: white; background: rgba(255,255,255,0.1);
        }
        .control-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .control-btn.active { background: #f59e0b; color: #000; } /* Kapatıldığında turuncu */
        .control-btn.danger { background: var(--danger); }
        .control-btn.danger:hover { background: var(--danger-hover); }

        /* Toplantı Linki Alanı */
        #invitePanel { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; margin-bottom: 20px; width: 100%; text-align: center; border: 1px dashed #64748b;}
        #inviteLink { color: #60a5fa; font-weight: bold; word-break: break-all; cursor: pointer; }
    </style>
</head>
<body>

    <div id="langSwitcher" onclick="toggleLanguage()">
        <span id="langIcon">🌐</span> <span id="langText">EN / TR</span>
    </div>

    <div id="lobbyScreen">
        <h1 id="titleText">Live Hub</h1>
        <div class="glass-panel">
            <h2 id="lobbyCreateTitle" style="margin-top: 0;">Start a Meeting</h2>
            <p id="lobbyCreateDesc" style="color: #cbd5e1; font-size: 14px; margin-bottom: 20px;">Start a new video conference and invite others.</p>
            <button id="createMeetingBtn" class="btn btn-primary">Start New Meeting</button>
            
            <div style="margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>

            <h2 id="lobbyJoinTitle">Join a Meeting</h2>
            <div class="input-group">
                <label id="lobbyJoinDesc" for="roomInput">Meeting ID or Link:</label>
                <input type="text" id="roomInput" placeholder="Paste ID here...">
            </div>
            <button id="joinMeetingBtn" class="btn btn-secondary">Join Meeting</button>
        </div>
    </div>

    <div id="meetingScreen">
        
        <div id="invitePanel">
            <div id="inviteText" style="margin-bottom: 8px; color: #cbd5e1;">Invite others to join using this link:</div>
            <div id="inviteLink" onclick="copyInviteLink()">Generating link...</div>
        </div>

        <div id="videoGrid">
            </div>

        <div id="controlsBar">
            <button id="toggleAudioBtn" class="control-btn" title="Mute/Unmute Audio">🎤</button>
            <button id="toggleVideoBtn" class="control-btn" title="Turn Off/On Camera">📷</button>
            <button id="switchCameraBtn" class="control-btn" title="Switch Front/Rear Camera" style="display: none;">🔄</button>
            <button id="leaveMeetingBtn" class="control-btn danger" title="Leave Meeting">✖</button>
        </div>
    </div>

    <script src="app.js?v=1"></script>
</body>
</html>
