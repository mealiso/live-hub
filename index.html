<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Hub - Meeting</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet" />
    <style>
        /* SIFIRLAMA VE DEĞİŞKENLER */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca;
            --danger: #ef4444; --danger-hover: #dc2626;
            --warning: #f59e0b; --bg-dark: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85); --panel-border: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc; --text-muted: #cbd5e1;
            --sidebar-width: 340px;
        }

        /* 100dvh ile mobil tarayıcı çubuğu sorununu çözüyoruz */
        body { 
            font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); 
            color: var(--text-main); height: 100dvh; width: 100vw; overflow: hidden; 
            display: flex; flex-direction: column;
        }
        
        .material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; display: flex; align-items: center; justify-content: center; }

        /* LOBİ VE GENEL */
        #langSwitcher { 
            position: absolute; top: 15px; right: 15px; z-index: 100; 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            padding: 8px 16px; border-radius: 30px; cursor: pointer; 
            border: 1px solid var(--panel-border); font-weight: 600; font-size: 14px;
            display: flex; align-items: center; gap: 6px; transition: 0.3s; 
        }
        #langSwitcher:hover { background: rgba(255, 255, 255, 0.2); }

        #lobbyScreen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; height: 100%; padding: 20px; overflow-y: auto;
        }
        h1 { font-weight: 800; font-size: clamp(2rem, 5vw, 2.5rem); margin-bottom: 20px; text-align: center; }
        
        .glass-panel {
            background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--panel-border);
            border-radius: 20px; padding: clamp(20px, 5vw, 35px); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%; max-width: 480px; text-align: center;
        }

        .input-group { margin-bottom: 15px; width: 100%; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 14px; font-weight: 600;}
        input[type="text"] { 
            width: 100%; padding: 14px 16px; font-size: 16px; border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); 
            color: white; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--primary); }

        .btn { 
            padding: 14px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 10px; 
            font-weight: 600; transition: all 0.3s ease; width: 100%; margin-bottom: 12px; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn:hover:not(:disabled) { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .btn-danger { background: var(--danger); color: white; }

        /* TOPLANTI EKRANI */
        #meetingWrapper { display: none; width: 100%; height: 100%; flex-direction: row; overflow: hidden; }
        #mainContent { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; overflow: hidden; padding: 15px;}
        
        #invitePanel { 
            background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 12px; 
            margin-bottom: 15px; width: 100%; text-align: center; border: 1px dashed #64748b; flex-shrink: 0;
        }
        #inviteLink { color: #818cf8; font-weight: 600; word-break: break-all; cursor: pointer; font-size: 14px;}

        /* VİDEO GRID */
        #videoGrid {
            flex: 1; overflow-y: auto; padding-bottom: 100px; /* Kontrollerin arkasında kalmaması için */
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            grid-auto-rows: max-content;
            gap: 12px; align-content: center; justify-items: center;
        }
        /* Kaydırma çubuğunu gizle ama kaydırmaya izin ver */
        #videoGrid::-webkit-scrollbar { width: 0px; }
        
        .video-container { 
            position: relative; border-radius: 16px; overflow: hidden; background: #000; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.5); aspect-ratio: 16/9; width: 100%;
        }
        .video-container video { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-container video.mirror { transform: scaleX(-1); }
        .name-badge { 
            position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); 
            padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; 
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
        }

        /* YAN PANEL (SIDEBAR - CHAT & PARTICIPANTS) */
        #sidebar { 
            width: var(--sidebar-width); background: var(--panel-bg); border-left: 1px solid var(--panel-border);
            display: none; flex-direction: column; backdrop-filter: blur(20px); height: 100%; flex-shrink: 0; z-index: 1000;
        }
        .sidebar-tabs { display: flex; border-bottom: 1px solid var(--panel-border); flex-shrink: 0;}
        .tab-btn { 
            flex: 1; padding: 15px; background: transparent; border: none; color: var(--text-muted); 
            font-weight: 600; cursor: pointer; transition: 0.3s; 
        }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); background: rgba(255,255,255,0.05); }
        
        .tab-content { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .tab-content.active { display: flex; }

        /* Chat Görünümü */
        #chatMessages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; font-size: 14px; word-break: break-word;}
        .msg-box.me { background: rgba(79, 70, 229, 0.3); align-self: flex-end; border-bottom-right-radius: 2px;}
        .msg-author { font-size: 11px; color: #818cf8; font-weight: 600; margin-bottom: 4px; }
        
        #chatInputArea { display: flex; padding: 12px; border-top: 1px solid var(--panel-border); gap: 8px; background: rgba(0,0,0,0.3); flex-shrink: 0;}
        #chatInputArea input { flex: 1; padding: 10px; font-size: 14px; border-radius: 8px; border: 1px solid var(--panel-border); background: rgba(0,0,0,0.5); color: white; outline: none;}
        #sendChatBtn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 0 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        /* Katılımcılar Görünümü */
        #participantsList { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .participant-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.3); padding: 10px 12px; border-radius: 8px; font-size: 14px;
        }
        .mute-user-btn { 
            background: rgba(239, 68, 68, 0.2); color: #f87171; border: none; border-radius: 6px; 
            padding: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .mute-user-btn:hover { background: var(--danger); color: white; }
        #hostControls { padding: 15px; border-top: 1px solid var(--panel-border); display: none; flex-shrink: 0;}

        /* ALT KONTROL ÇUBUĞU */
        #controlsBar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 100px; border: 1px solid var(--panel-border);
            display: flex; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 500;
            width: max-content; max-width: 95%; flex-wrap: wrap; justify-content: center;
        }
        .control-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all 0.2s ease; color: white; background: rgba(255,255,255,0.1);
        }
        .control-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
        .control-btn.off { background: var(--warning); color: #1e1b4b; }
        .control-btn.danger { background: var(--danger); }
        .control-btn.sidebar-active { background: var(--primary); }

        #closeSidebarMobile { 
            display: none; background: rgba(255,255,255,0.05); color: white; border: none; 
            padding: 15px; cursor: pointer; align-items: center; justify-content: center; 
            border-bottom: 1px solid var(--panel-border); font-weight: 600; flex-shrink: 0;
        }

        /* MOBİL TABLET UYUMU KESİN ÇÖZÜM */
        @media (max-width: 768px) {
            #mainContent { padding: 10px; }
            #videoGrid { padding-bottom: 120px; gap: 10px;}
            .video-container { aspect-ratio: auto; min-height: 200px; } /* Mobilde kareye yakın esnemesine izin ver */
            
            #controlsBar { bottom: 15px; padding: 8px 15px; gap: 8px;}
            .control-btn { width: 45px; height: 45px; }
            .control-btn .material-symbols-rounded { font-size: 20px; }

            /* Sidebar'ı tam ekran örtüsü yap */
            #sidebar { 
                position: absolute; right: 0; top: 0; width: 100%; max-width: 100%;
                transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #sidebar.open { transform: translateX(0); }
            #closeSidebarMobile { display: flex !important; }
        }
    </style>
</head>
<body>

    <div id="langSwitcher" onclick="toggleLanguage()">
        <span class="material-symbols-rounded" style="font-size: 18px;">language</span> 
        <span id="langText">EN / TR</span>
    </div>

    <div id="lobbyScreen">
        <h1 id="titleText">Live Hub</h1>
        <div class="glass-panel">
            <div class="input-group">
                <label id="lobbyNameDesc" for="usernameInput">Your Name:</label>
                <input type="text" id="usernameInput" placeholder="Enter your name...">
            </div>

            <div style="margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>

            <h2 id="lobbyCreateTitle" style="margin-top: 0; font-size: 1.3rem;">Start a Meeting</h2>
            <button id="createMeetingBtn" class="btn btn-primary">
                <span class="material-symbols-rounded">video_call</span> <span id="btnCreateText">Start Meeting</span>
            </button>
            
            <div style="margin: 25px 0; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative;">
                <span style="position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); padding: 0 10px; font-size: 12px; color: var(--text-muted); border-radius: 5px;">OR</span>
            </div>

            <h2 id="lobbyJoinTitle" style="font-size: 1.3rem; margin-top: 0;">Join a Meeting</h2>
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="roomInput" placeholder="Meeting ID or Link...">
            </div>
            <button id="joinMeetingBtn" class="btn btn-secondary">
                <span class="material-symbols-rounded">login</span> <span id="btnJoinText">Join Meeting</span>
            </button>
        </div>
    </div>

    <div id="meetingWrapper">
        <div id="mainContent">
            <div id="invitePanel">
                <div id="inviteText" style="color: var(--text-muted); font-size: 13px; margin-bottom: 4px;">Invite others to join:</div>
                <div id="inviteLink" onclick="copyInviteLink()" title="Click to copy">Generating link...</div>
            </div>

            <div id="videoGrid"></div>

            <div id="controlsBar">
                <button id="toggleAudioBtn" class="control-btn" title="Mute/Unmute">
                    <span class="material-symbols-rounded">mic</span>
                </button>
                <button id="toggleVideoBtn" class="control-btn" title="Turn Off/On Camera">
                    <span class="material-symbols-rounded">videocam</span>
                </button>
                <button id="switchCameraBtn" class="control-btn" title="Switch Camera" style="display: none;">
                    <span class="material-symbols-rounded">cameraswitch</span>
                </button>
                <button id="toggleParticipantsBtn" class="control-btn" title="Participants">
                    <span class="material-symbols-rounded">group</span>
                </button>
                <button id="toggleChatBtn" class="control-btn" title="Chat">
                    <span class="material-symbols-rounded">chat</span>
                </button>
                <button id="leaveMeetingBtn" class="control-btn danger" title="Leave">
                    <span class="material-symbols-rounded">call_end</span>
                </button>
            </div>
        </div>

        <div id="sidebar">
            <button id="closeSidebarMobile">
                <span class="material-symbols-rounded">keyboard_arrow_right</span> <span style="margin-left:5px;">Close Panel</span>
            </button>
            <div class="sidebar-tabs">
                <button id="tabBtnParticipants" class="tab-btn active">Participants</button>
                <button id="tabBtnChat" class="tab-btn">Chat</button>
            </div>

            <div id="tabParticipants" class="tab-content active">
                <div id="participantsList"></div>
                <div id="hostControls">
                    <button id="muteAllBtn" class="btn btn-danger" style="margin:0;">
                        <span class="material-symbols-rounded">mic_off</span> Mute All
                    </button>
                </div>
            </div>

            <div id="tabChat" class="tab-content">
                <div id="chatMessages"></div>
                <div id="chatInputArea">
                    <input type="text" id="chatInput" placeholder="Type a message...">
                    <button id="sendChatBtn"><span class="material-symbols-rounded">send</span></button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=4"></script>
</body>
</html>
