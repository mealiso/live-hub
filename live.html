<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Yayın Başlat</title>
    <!-- PeerJS Kütüphanesi -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px;}
        h1 { margin-top: 0; }
        
        /* Video ve Sayaç Alanı */
        .video-wrapper { position: relative; width: 100%; max-width: 800px; margin: 0 auto 20px auto; }
        video { width: 100%; background: #000; border: 2px solid #333; border-radius: 8px; display: block; transition: transform 0.3s; }
        
        /* Ayna Efekti (Ön kamera için görüntüyü ters çevirir) */
        video.mirror { transform: scaleX(-1); }
        
        .viewer-count { position: absolute; top: 10px; right: 10px; background: rgba(229, 9, 20, 0.8); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; display: none; z-index: 10;}
        
        /* Link Paylaşım Alanı */
        #linkContainer { display: none; background: #222; padding: 15px; border-radius: 8px; margin: 20px auto; width: 100%; max-width: 800px; box-sizing: border-box;}
        input { width: 90%; padding: 10px; font-size: 16px; color: black; margin-top: 10px; text-align: center; border-radius: 5px; border: none;}
        
        /* Buton Genel Stilleri */
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; font-weight: bold; transition: 0.3s; }
        
        /* Yayın Ayarları Paneli */
        #setupPanel { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; margin: 0 auto 20px auto; border: 1px solid #444; box-sizing: border-box;}
        #setupPanel h3 { margin-top: 0; }
        #setupPanel select { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 15px; font-size: 16px; border-radius: 5px;}
        .btn-start { background: #e50914; color: white; width: 100%; }
        .btn-start:hover { background: #b20710; }
        .btn-start:disabled { background: #555; cursor: not-allowed; }

        /* Yayın İçi Kontrol Paneli */
        #controlsPanel { display: none; margin-top: 15px; flex-wrap: wrap; justify-content: center; gap: 10px;}
        .btn-toggle { background: #555; color: white; }
        .btn-toggle.active { background: #f39c12; }
        .btn-switch { background: #3498db; color: white; }
        .btn-switch:hover { background: #2980b9; }
        .btn-stop { background: #333; color: white; }
        .btn-stop:hover { background: #111; }
    </style>
</head>
<body>
    <h1>Yayıncı Paneli</h1>
    
    <div class="video-wrapper">
        <video id="liveVideo" autoplay muted playsinline></video>
        <div id="viewerBadge" class="viewer-count">👁️ 0 İzleyici</div>
    </div>
    
    <!-- YAYIN AYARLARI -->
    <div id="setupPanel">
        <h3>Yayın Ayarları</h3>
        <label for="streamSource">Yayın Türünü Seçin:</label>
        <select id="streamSource">
            <option value="camera">Kamera ile Yayın</option>
            <option value="screen">Ekran Paylaşımı</option>
        </select>
        <button id="startBtn" class="btn btn-start">Yayını Başlat</button>
    </div>

    <!-- YAYIN İÇİ KONTROLLER -->
    <div id="controlsPanel">
        <button id="switchCameraBtn" class="btn btn-switch" style="display: none;">Ön/Arka Kamera Çevir</button>
        <button id="toggleVideoBtn" class="btn btn-toggle">Görüntüyü Kapat</button>
        <button id="toggleAudioBtn" class="btn btn-toggle">Sesi Kapat</button>
        <button id="stopStreamBtn" class="btn btn-stop">Yayını Bitir</button>
    </div>

    <!-- İZLEYİCİ LİNKİ -->
    <div id="linkContainer">
        <p>İzleyicilerin bu linkten yayına katılabilir:</p>
        <input type="text" id="shareLink" readonly onclick="this.select()">
    </div>

    <!-- Cache kırmak için v=4 ekledik -->
    <script src="main.js?v=4"></script>
</body>
</html>
