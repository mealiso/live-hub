<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Yayın Başlat</title>
    <!-- PeerJS Kütüphanesi -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial; background: #121212; color: white; text-align: center; }
        video { width: 80%; max-width: 800px; background: #000; border: 2px solid #333; margin-bottom: 20px; }
        #linkContainer { display: none; background: #222; padding: 15px; border-radius: 8px; margin: 20px auto; width: 80%; max-width: 800px; }
        input { width: 80%; padding: 10px; font-size: 16px; color: black; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #e50914; color: white; border: none; border-radius: 5px;}
    </style>
</head>
<body>
    <h1>Yayıncı Paneli</h1>
    <video id="liveVideo" autoplay muted playsinline></video>
    <br>
    <button id="startBtn">Yayını Başlat ve Link Oluştur</button>

    <div id="linkContainer">
        <p>İzleyicilerin bu linkten yayına katılabilir:</p>
        <input type="text" id="shareLink" readonly>
    </div>

    <script src="main.js"></script>
</body>
</html>
