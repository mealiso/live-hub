<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Hub - Stream</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 20px;}
        
        /* Dil Değiştirme Butonu (Sağ Üst) */
        #langSwitcher { position: fixed; top: 20px; right: 20px; z-index: 100; background: #333; padding: 8px 15px; border-radius: 20px; cursor: pointer; border: 1px solid #555; font-weight: bold; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        #langSwitcher:hover { background: #444; }

        .video-wrapper { position: relative; width: 100%; max-width: 800px; margin: 20px auto; }
        video { width: 100%; background: #000; border: 2px solid #333; border-radius: 8px; display: block; transition: transform 0.3s; }
        video.mirror { transform: scaleX(-1); }
        
        .viewer-count { position: absolute; top: 10px; right: 10px; background: rgba(229, 9, 20, 0.8); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; display: none; z-index: 10;}
        
        #linkContainer { display: none; background: #222; padding: 15px; border-radius: 8px; margin: 20px auto; width: 100%; max-width: 800px; box-sizing: border-box;}
        input { width: 90%; padding: 10px; font-size: 16px; color: black; margin-top: 10px; text-align: center; border-radius: 5px; border: none;}
        
        .btn { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; font-weight: bold; transition: 0.3s; }
        
        #setupPanel { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; margin: 0 auto 20px auto; border: 1px solid #444; box-sizing: border-box;}
        #setupPanel select { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 15px; font-size: 16px; border-radius: 5px;}
        .btn-start { background: #e50914; color: white; width: 100%; }
        .btn-start:hover { background: #b20710; }

        #controlsPanel { display: none; margin-top: 15px; flex-wrap: wrap; justify-content: center; gap: 10px;}
        .btn-toggle { background: #555; color: white; }
        .btn-toggle.active { background: #f39c12; }
        .btn-switch { background: #3498db; color: white; }
        .btn-stop { background: #333; color: white; }
    </style>
</head>
<body>

    <div id="langSwitcher" onclick="toggleLanguage()">
        <span id="langIcon">🌐</span> <span id="langText">EN / TR</span>
    </div>

    <h1 id="mainTitle">Broadcast Panel</h1>
    
    <div class="video-wrapper">
        <video id="liveVideo" autoplay muted playsinline></video>
        <div id="viewerBadge" class="viewer-count">👁️ 0 <span class="lang-viewers">Viewers</span></div>
    </div>
    
    <div id="setupPanel">
        <h3 id="setupTitle">Stream Settings</h3>
        <label id="labelSource" for="streamSource">Select Stream Type:</label>
        <select id="streamSource">
            <option value="camera" id="optCamera">Camera Stream</option>
            <option value="screen" id="optScreen">Screen Share</option>
        </select>
        <button id="startBtn" class="btn btn-start">Start Stream</button>
    </div>

    <div id="controlsPanel">
        <button id="switchCameraBtn" class="btn btn-switch" style="display: none;">Switch Camera</button>
        <button id="toggleVideoBtn" class="btn btn-toggle">Mute Video</button>
        <button id="toggleAudioBtn" class="btn btn-toggle">Mute Audio</button>
        <button id="stopStreamBtn" class="btn btn-stop">End Stream</button>
    </div>

    <div id="linkContainer">
        <p id="shareText">Your viewers can join using this link:</p>
        <input type="text" id="shareLink" readonly onclick="this.select()">
    </div>

    <script src="main.js?v=5"></script>
</body>
</html>
